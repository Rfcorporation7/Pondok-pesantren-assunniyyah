<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Sinkron Akurat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 450px; background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid #eee; }
        .header { text-align: center; margin-bottom: 15px; }
        .status { font-size: 0.7rem; font-weight: 600; color: #34a853; background: #e6f4ea; padding: 5px 12px; border-radius: 100px; display: inline-block; margin-bottom: 8px; }
        h2 { color: var(--primary); margin: 0; font-size: 1.3rem; }
        .info-list { margin-top: 15px; }
        .row { padding: 12px 0; border-bottom: 1px solid #f1f3f4; }
        .row:last-child { border-bottom: none; }
        .label { font-size: 0.65rem; color: #70757a; text-transform: uppercase; font-weight: 600; }
        .value { font-size: 0.95rem; color: #202124; margin-top: 3px; font-weight: 500; }
        #map { height: 220px; width: 100%; border-radius: 16px; margin-top: 15px; border: 1px solid #f1f3f4; z-index: 1; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div id="status-badge" class="status">MENUNGGU GPS...</div>
        <h2>Informasi Wilayah</h2>
    </div>
    
    <div class="info-list" id="display">
        <p style="text-align: center; color: #888;">Mendeteksi koordinat...</p>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = "bdc_75dff80aec6d4698ac9b50c61f81c882"; 
    let map, marker;

    map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function updateStatus(text, success) {
        const badge = document.getElementById('status-badge');
        badge.innerText = text;
        badge.style.background = success ? '#e6f4ea' : '#fff5f5';
        badge.style.color = success ? '#34a853' : '#e53e3e';
    }

    async function getGeocoding(lat, lon) {
        const url = `https://api.bigdatacloud.net/data/reverse-geocode?latitude=${lat}&longitude=${lon}&localityLanguage=id&key=${API_KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();

            let loc = {
                provinsi: "Jawa Tengah",
                kabupaten: "Rembang",
                kecamatan: "-",
                desa: "-",
                dusun: "-"
            };

            // Mengumpulkan semua kandidat nama wilayah
            const nodes = [
                ...(data.localityInfo.administrative || []), 
                ...(data.localityInfo.informative || [])
            ];

            nodes.forEach(item => {
                const n = item.name;
                const lv = item.adminLevel;

                // Prioritaskan 'Sale' sebagai Kecamatan jika ditemukan di level mana pun
                if (n.includes("Sale")) {
                    loc.kecamatan = "Kecamatan Sale";
                } 
                // Jika tidak ada Sale, baru ambil Sedan sebagai alternatif (antisipasi perbatasan)
                else if (n.includes("Sedan") && loc.kecamatan === "-") {
                    loc.kecamatan = "Kecamatan Sedan";
                }

                if (n.includes("Kabupaten") || n.includes("Kota")) loc.kabupaten = n;
                
                // Cari Desa (Tengger, Kalijambe, dll)
                if (lv >= 8 && !n.includes("Kecamatan") && !n.includes("Kabupaten")) {
                    loc.desa = n;
                }
            });

            // Dusun/Area Lokal
            loc.dusun = data.locality || data.principalSubdivision || "-";
            
            // Perbaikan khusus jika Dusun malah terisi nama Kecamatan
            if (loc.dusun.includes("Sedan") || loc.dusun.includes("Sale")) {
                loc.dusun = "Area " + (loc.desa !== "-" ? loc.desa : loc.kecamatan);
            }

            document.getElementById('display').innerHTML = `
                <div class="row"><div class="label">Dusun / Area</div><div class="value">${loc.dusun}</div></div>
                <div class="row"><div class="label">Desa / Kelurahan</div><div class="value">${loc.desa}</div></div>
                <div class="row"><div class="label">Kecamatan</div><div class="value">${loc.kecamatan}</div></div>
                <div class="row"><div class="label">Kabupaten</div><div class="value">${loc.kabupaten}</div></div>
                <div class="row"><div class="label">Provinsi</div><div class="value">${loc.provinsi}</div></div>
            `;
            updateStatus("LOKASI SINKRON", true);

        } catch (e) {
            updateStatus("KESALAHAN DATA", false);
        }
    }

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                map.setView([latitude, longitude], 16);
                if (marker) map.removeLayer(marker);
                marker = L.marker([latitude, longitude]).addTo(map);
                getGeocoding(latitude, longitude);
            }, () => {
                updateStatus("GPS NONAKTIF", false);
            }, { enableHighAccuracy: true });
        }
    }

    window.onload = startGPS;
</script>
</body>
</html>
