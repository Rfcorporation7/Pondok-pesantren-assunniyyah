<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Location Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --error: #fb7185;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-card {
            background: var(--card);
            width: 90%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .icon-header {
            width: 64px;
            height: 64px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
            color: var(--accent);
        }

        h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 1.5rem; letter-spacing: -0.5px; }

        .status-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .btn-track {
            background: var(--accent);
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .btn-track:active { transform: scale(0.96); }

        .info-panel {
            text-align: left;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .label {
            color: var(--accent);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 6px;
        }

        .value {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 18px;
            display: block;
            color: var(--text-main);
        }

        .pulse { animation: pulse-opacity 1.5s infinite; }
        @keyframes pulse-opacity {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .error { color: var(--error); font-weight: 500; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="icon-header">
        <i data-lucide="map-pin" size="32"></i>
    </div>
    <h1>Geocoding Lokasi</h1>

    <div id="msg" class="status-box">Ketuk tombol untuk melacak</div>

    <button class="btn-track" onclick="initGPS()">
        <i data-lucide="navigation-2" size="20"></i> Dapatkan Lokasi
    </button>

    <div id="resGroup" class="info-panel" style="display: none;">
        <span class="label">Koordinat</span>
        <span id="txtCoord" class="value">-</span>

        <span class="label">Alamat Lengkap</span>
        <span id="txtAddr" class="value">Memproses...</span>
    </div>
</div>

<script>
    // Inisialisasi Ikon Lucide
    lucide.createIcons();

    const msg = document.getElementById('msg');
    const resGroup = document.getElementById('resGroup');
    const txtAddr = document.getElementById('txtAddr');

    function initGPS() {
        msg.innerHTML = "Mengakses GPS...";
        msg.classList.add('pulse');
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(successGPS, failGPS, {
                enableHighAccuracy: true,
                timeout: 7000
            });
        } else {
            msg.innerHTML = "Browser tidak mendukung GPS";
        }
    }

    function successGPS(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        
        msg.classList.remove('pulse');
        msg.innerHTML = "Lokasi Berhasil Dikunci";
        resGroup.style.display = "block";
        document.getElementById('txtCoord').innerText = `${lat}, ${lng}`;
        
        callGoAPI(lat, lng);
    }

    async function callGoAPI(lat, lng) {
        txtAddr.innerHTML = "<span class='pulse'>Menghubungi server...</span>";
        
        const KEY = '706b1a11-718b-5864-6226-dae984ab';
        // Gunakan endpoint reverse yang paling stabil
        const url = `https://api.goapi.io/v1/reverse?lat=${lat}&lng=${lng}&api_key=${KEY}`;

        try {
            const req = await fetch(url);
            const res = await req.json();

            if (res.status === "success") {
                const d = res.data;
                // Susun alamat dari data yang tersedia
                const parts = [
                    d.name,
                    d.village,
                    d.district,
                    d.city,
                    d.province
                ].filter(Boolean); // Hanya ambil yang tidak kosong

                txtAddr.innerHTML = parts.join(', ') || "Data alamat tidak tersedia untuk koordinat ini.";
            } else {
                txtAddr.innerHTML = `<span class="error">Gagal: ${res.message}</span>`;
            }
        } catch (e) {
            txtAddr.innerHTML = `<span class="error">Koneksi Gagal / API Error</span>`;
        }
    }

    function failGPS(err) {
        msg.classList.remove('pulse');
        msg.innerHTML = `<span class="error">GPS Error: ${err.message}</span>`;
    }
</script>

</body>
</html>
