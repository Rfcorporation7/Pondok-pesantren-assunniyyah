<!DOCTYPE html>
<html>
<head>
    <title>Lokasi Tanpa API Key</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .hasil-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        h2 { margin-top: 0; color: #333; }
        .data { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding: 5px 0; }
        .label { font-weight: bold; font-size: 12px; color: blue; }
    </style>
</head>
<body>

<div class="hasil-box">
    <h2>Informasi Wilayah</h2>
    <div id="konten">Sedang memuat...</div>
</div>

<script>
    async function ambilAlamat() {
        // MENGGUNAKAN ENDPOINT CLIENT (GRATIS & TANPA KEY)
        const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=-6.8450&longitude=111.6044&localityLanguage=id`;

        try {
            const r = await fetch(url);
            const d = await r.json();
            
            let html = "";
            
            // Mengambil Desa, Kec, Kab, Prov dari 'localityInfo'
            d.localityInfo.administrative.forEach(item => {
                let namaWilayah = "";
                if(item.adminLevel === 2) namaWilayah = "Provinsi";
                if(item.adminLevel === 4) namaWilayah = "Kabupaten";
                if(item.adminLevel === 6) namaWilayah = "Kecamatan";
                if(item.adminLevel === 8) namaWilayah = "Desa/Kelurahan";

                if(namaWilayah) {
                    html += `<div class="data"><div class="label">${namaWilayah}</div><div>${item.name}</div></div>`;
                }
            });

            // Tambahkan Dusun
            html = `<div class="data"><div class="label">Dusun/Area</div><div>${d.locality || d.city || "-"}</div></div>` + html;

            document.getElementById('konten').innerHTML = html;
        } catch (e) {
            document.getElementById('konten').innerHTML = "Gagal mengambil data: " + e.message;
        }
    }
    ambilAlamat();
</script>

</body>
</html>
