<!DOCTYPE html>
<html>
<head>
    <title>Geocoding Presisi Rembang</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; font-size: 1.2rem; }
        .data-group { margin-bottom: 15px; }
        .label { font-size: 0.7rem; color: #70757a; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        .value { font-size: 1rem; color: #202124; margin-top: 4px; border-bottom: 1px solid #f1f3f4; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Informasi Wilayah</h2>
    <div id="display">
        <p>Sedang sinkronisasi data...</p>
    </div>
</div>

<script>
    async function ambilData() {
        // GANTI DENGAN API KEY ANDA
        const API_KEY = "bdc_75dff80aec6d4698ac9b50c61f81c882"; 
        
        // Koordinat dari gambar Anda (Sale, Rembang)
        const lat = -6.8450;
        const lon = 111.6044;
        
        const url = `https://api.bigdatacloud.net/data/reverse-geocode?latitude=${lat}&longitude=${lon}&localityLanguage=id&key=${API_KEY}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            let res = {
                dusun: data.locality || "-",
                desa: "-",
                kecamatan: "-",
                kabupaten: "-",
                provinsi: "-"
            };

            // Logika Scan Pintar: Mencari berdasarkan nama dan level
            if (data.administrative && data.administrative.length > 0) {
                data.administrative.forEach(item => {
                    const nama = item.name;
                    const level = item.adminLevel;

                    // Deteksi Provinsi
                    if (level === 2 || level === 3 || nama.includes("Jawa Tengah")) {
                        if (nama !== "Indonesia") res.provinsi = nama;
                    }
                    // Deteksi Kabupaten
                    if (nama.includes("Kabupaten") || nama.includes("Kota") || level === 4) {
                        res.kabupaten = nama;
                    }
                    // Deteksi Kecamatan (Kunci perbaikan Anda di sini)
                    if (nama.includes("Kecamatan") || level === 6 || level === 7) {
                        res.kecamatan = nama;
                    }
                    // Deteksi Desa
                    if (level >= 8) {
                        res.desa = nama;
                    }
                });
            }

            // Jika Dusun sama dengan Kecamatan (seperti kasus "Sale"), kita rapikan
            if (res.dusun === res.kecamatan.replace("Kecamatan ", "")) {
                res.dusun = "Area " + res.dusun;
            }

            document.getElementById('display').innerHTML = `
                <div class="data-group"><div class="label">Dusun / Area</div><div class="value">${res.dusun}</div></div>
                <div class="data-group"><div class="label">Desa / Kelurahan</div><div class="value">${res.desa}</div></div>
                <div class="data-group"><div class="label">Kecamatan</div><div class="value">${res.kecamatan}</div></div>
                <div class="data-group"><div class="label">Kabupaten</div><div class="value">${res.kabupaten}</div></div>
                <div class="data-group"><div class="label">Provinsi</div><div class="value">${res.provinsi}</div></div>
            `;

        } catch (error) {
            document.getElementById('display').innerHTML = "<p>Gagal mengambil data. Periksa koneksi atau API Key.</p>";
        }
    }

    ambilData();
</script>

</body>
</html>
