<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Geocoding Indonesia</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 { font-weight: 300; margin-bottom: 1.5rem; }

        .status-box {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 auto;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        .result-item {
            text-align: left;
            margin-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1rem;
        }

        .label { color: var(--accent); font-size: 0.8rem; display: block; }
        .value { font-weight: 500; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <i data-lucide="map-pin" style="color: var(--accent); margin-bottom: 10px;"></i>
    <h2>Geocoding Lokasi</h2>
    
    <div id="status" class="status-box">Klik tombol di bawah untuk melacak lokasi Anda</div>
    
    <button onclick="getLocation()">
        <i data-lucide="navigation"></i> Dapatkan Lokasi
    </button>

    <div id="result" class="result-item" style="display: none;">
        <span class="label">Koordinat:</span>
        <span id="coords" class="value">-</span>
        
        <span class="label">Alamat Lengkap (GoAPI):</span>
        <span id="address" class="value">Mencari alamat...</span>
    </div>
</div>

<script>
    // Inisialisasi Icon
    lucide.createIcons();

    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');

    function getLocation() {
        statusDiv.innerHTML = "Meminta izin GPS...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition, showError);
        } else {
            statusDiv.innerHTML = "Geolocation tidak didukung browser ini.";
        }
    }

    function showPosition(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        
        statusDiv.innerHTML = "Lokasi ditemukan!";
        resultDiv.style.display = "block";
        document.getElementById('coords').innerText = `${lat}, ${lon}`;
        
        // Panggil Fungsi Reverse Geocoding GoAPI
        reverseGeocode(lat, lon);
    }

    async function reverseGeocode(lat, lon) {
        // Catatan: Ganti 'YOUR_API_KEY' dengan API Key asli dari dashboard GoAPI.io Anda
        const apiKey = '706b1a11-718b-5864-6226-dae984ab'; 
        const url = `https://api.goapi.io/v1/reverse?lat=${lat}&lon=${lon}&api_key=${apiKey}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.status === "success") {
                // GoAPI memberikan data yang sangat rapi
                const addr = data.data;
                document.getElementById('address').innerText = 
                    `${addr.name}, ${addr.village}, ${addr.district}, ${addr.city}, ${addr.province}`;
            } else {
                document.getElementById('address').innerText = "Gagal mengambil detail alamat.";
            }
        } catch (error) {
            document.getElementById('address').innerText = "Terjadi kesalahan koneksi.";
        }
    }

    function showError(error) {
        switch(error.code) {
            case error.PERMISSION_DENIED:
                statusDiv.innerHTML = "Izin lokasi ditolak user.";
                break;
            default:
                statusDiv.innerHTML = "Terjadi kesalahan GPS.";
        }
    }
</script>

</body>
</html>
