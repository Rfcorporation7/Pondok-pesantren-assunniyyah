<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Location Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --error: #fb7185;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-card {
            background: var(--card);
            width: 85%;
            max-width: 380px;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .icon-header {
            width: 50px;
            height: 50px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1rem;
            color: var(--accent);
        }

        h1 { font-size: 1.3rem; margin-bottom: 1.5rem; }

        .status-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
        }

        .btn-track {
            background: var(--accent);
            color: #000;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .info-panel {
            text-align: left;
            margin-top: 1.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .label {
            color: var(--accent);
            font-size: 0.7rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        .value { font-size: 0.95rem; margin-bottom: 12px; display: block; }
        .error { color: var(--error); }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="app-card">
    <div class="icon-header"><i data-lucide="map-pin"></i></div>
    <h1>Geocoding Lokasi</h1>
    <div id="msg" class="status-box">Siap melacak lokasi</div>
    <button class="btn-track" onclick="initGPS()">
        <i data-lucide="navigation"></i> Dapatkan Lokasi
    </button>

    <div id="resGroup" class="info-panel" style="display: none;">
        <span class="label">Koordinat</span>
        <span id="txtCoord" class="value">-</span>
        <span class="label">Alamat Lengkap</span>
        <span id="txtAddr" class="value">Memproses...</span>
    </div>
</div>

<script>
    lucide.createIcons();

    function initGPS() {
        const msg = document.getElementById('msg');
        msg.innerHTML = "Mengunci GPS...";
        msg.classList.add('pulse');
        
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            msg.classList.remove('pulse');
            msg.innerHTML = "Lokasi Berhasil Dikunci";
            document.getElementById('resGroup').style.display = "block";
            document.getElementById('txtCoord').innerText = `${lat}, ${lng}`;
            callGoAPI(lat, lng);
        }, err => {
            msg.innerHTML = "Gagal GPS: " + err.message;
        });
    }

    async function callGoAPI(lat, lng) {
        const txtAddr = document.getElementById('txtAddr');
        txtAddr.innerHTML = "<span class='pulse'>Mencari alamat...</span>";
        
        const KEY = '706b1a11-718b-5864-6226-dae984ab';
        // Menggunakan endpoint regional desa yang lebih spesifik untuk Indonesia
        const url = `https://api.goapi.io/v1/regional/desa?lat=${lat}&lng=${lng}&api_key=${KEY}`;

        try {
            const req = await fetch(url);
            const res = await req.json();

            if (res.status === "success") {
                // GoAPI regional biasanya mengembalikan data wilayah terstruktur
                const d = res.data;
                txtAddr.innerHTML = `${d.name}, ${d.kecamatan.name}, ${d.kota.name}, ${d.provinsi.name}`;
            } else {
                txtAddr.innerHTML = `<span class="error">Gagal: ${res.message}</span>`;
            }
        } catch (e) {
            txtAddr.innerHTML = `<span class="error">API Error atau Limit Habis</span>`;
        }
    }
</script>
</body>
</html>
