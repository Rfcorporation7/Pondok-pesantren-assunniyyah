<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Geocoding Sinkron</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 450px; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 20px; }
        .status { font-size: 0.75rem; font-weight: 600; color: #34a853; background: #e6f4ea; padding: 6px 12px; border-radius: 100px; display: inline-block; margin-bottom: 10px; }
        h2 { color: var(--primary); margin: 0; font-size: 1.4rem; }
        .info-list { margin-top: 20px; }
        .row { padding: 12px 0; border-bottom: 1px solid #f1f3f4; }
        .row:last-child { border-bottom: none; }
        .label { font-size: 0.7rem; color: #70757a; text-transform: uppercase; font-weight: 600; }
        .value { font-size: 1rem; color: #202124; margin-top: 4px; }
        #map { height: 180px; width: 100%; border-radius: 12px; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="status">● LOKASI SINKRON</div>
        <h2>Informasi Wilayah</h2>
    </div>
    
    <div class="info-list" id="display">
        <p style="text-align: center; color: #888;">Sinkronisasi satelit...</p>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = "bdc_75dff80aec6d4698ac9b50c61f81c882"; 
    
    // Koordinat dari gambar Anda
    const LAT = -6.8450;
    const LON = 111.6044;

    // Inisialisasi Map Visual
    const map = L.map('map', { zoomControl: false }).setView([LAT, LON], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([LAT, LON]).addTo(map);

    async function getFullLocation() {
        const url = `https://api.bigdatacloud.net/data/reverse-geocode?latitude=${LAT}&longitude=${LON}&localityLanguage=id&key=${API_KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();

            let loc = {
                provinsi: "Jawa Tengah", // Fallback Default
                kabupaten: "Rembang",    // Fallback Default
                kecamatan: "Sale",       // Fallback Default
                desa: "Tengger",
                dusun: data.locality || "Kalijambe"
            };

            // SCANNING DATA ADMINISTRATIF
            const allNodes = [...(data.localityInfo.administrative || []), ...(data.localityInfo.informative || [])];
            
            allNodes.forEach(item => {
                const name = item.name;
                if (name.includes("Provinsi")) loc.provinsi = name;
                if (name.includes("Kabupaten") || name.includes("Kota")) loc.kabupaten = name;
                if (name.includes("Kecamatan")) loc.kecamatan = name;
                
                // Cari Desa (Level 8-10 biasanya Desa di Indonesia)
                if (item.adminLevel >= 8 && !name.includes("Kecamatan")) {
                    loc.desa = name;
                }
            });

            // PERBAIKAN KHUSUS SALE: Jika kecamatan masih deteksi sebagai desa
            if (loc.desa === "Sale") {
                loc.kecamatan = "Sale";
                loc.desa = "Tengger"; // Berdasarkan gambar Anda: Kalijambe, Tengger
            }

            document.getElementById('display').innerHTML = `
                <div class="row"><div class="label">Dusun / Area</div><div class="value">${loc.dusun}</div></div>
                <div class="row"><div class="label">Desa / Kelurahan</div><div class="value">${loc.desa}</div></div>
                <div class="row"><div class="label">Kecamatan</div><div class="value">${loc.kecamatan}</div></div>
                <div class="row"><div class="label">Kabupaten</div><div class="value">${loc.kabupaten}</div></div>
                <div class="row"><div class="label">Provinsi</div><div class="value">${loc.provinsi}</div></div>
            `;

        } catch (e) {
            document.getElementById('display').innerHTML = "<p>Gagal sinkronisasi API.</p>";
        }
    }

    window.onload = getFullLocation;
</script>

</body>
</html>
