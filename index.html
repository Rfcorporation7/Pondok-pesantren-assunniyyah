<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Location Indonesia</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --error: #fb7185;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-card {
            background: var(--card);
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .icon-header {
            width: 60px;
            height: 60px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
            color: var(--accent);
        }

        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 2rem; }

        .status-display {
            background: rgba(0,0,0,0.2);
            padding: 1.2rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

        .info-group {
            text-align: left;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .label {
            color: var(--accent);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 4px;
        }

        .value {
            font-size: 1rem;
            margin-bottom: 15px;
            display: block;
            word-break: break-all;
        }

        .error-text { color: var(--error); }

        /* Loading Animation */
        .pulse { animation: pulse-animation 1.5s infinite; }
        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="icon-header">
        <i data-lucide="map-pin"></i>
    </div>
    <h1>Geocoding Lokasi</h1>

    <div id="statusText" class="status-display">Siap melacak lokasi</div>

    <button class="btn-primary" onclick="startTracking()">
        <i data-lucide="navigation"></i> Dapatkan Lokasi
    </button>

    <div id="resultArea" class="info-group" style="display: none;">
        <span class="label">Koordinat GPS</span>
        <span id="coordVal" class="value">-</span>

        <span class="label">Alamat Lengkap (GoAPI)</span>
        <span id="addressVal" class="value">Menunggu data...</span>
    </div>
</div>

<script>
    // Load Icons
    lucide.createIcons();

    const statusText = document.getElementById('statusText');
    const resultArea = document.getElementById('resultArea');
    const addressVal = document.getElementById('addressVal');

    function startTracking() {
        statusText.innerHTML = "Meminta akses GPS...";
        statusText.classList.add('pulse');
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(onSuccess, onError, {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 0
            });
        } else {
            statusText.innerHTML = "GPS tidak didukung browser.";
        }
    }

    function onSuccess(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        
        statusText.classList.remove('pulse');
        statusText.innerHTML = "Lokasi ditemukan!";
        resultArea.style.display = "block";
        document.getElementById('coordVal').innerText = `${lat}, ${lng}`;
        
        fetchAddress(lat, lng);
    }

    async function fetchAddress(lat, lng) {
        addressVal.innerHTML = "<span class='pulse'>Mengambil alamat...</span>";
        
        // --- MASUKKAN API KEY ANDA DI SINI ---
        const API_KEY = '706b1a11-718b-5864-6226-dae984ab'; 
        
        // Menggunakan endpoint regional/reverse sesuai dokumentasi GoAPI
        const url = `https://api.goapi.io/v1/regional/reverse?lat=${lat}&lng=${lng}&api_key=${API_KEY}`;

        try {
            const response = await fetch(url);
            const res = await response.json();

            if (res.status === "success" && res.data.length > 0) {
                const loc = res.data[0];
                addressVal.innerHTML = `${loc.village}, ${loc.district}, ${loc.city}, ${loc.province}`;
            } else {
                // Jika sukses tapi data kosong atau status bukan success
                addressVal.innerHTML = `<span class="error-text">Gagal: ${res.message || 'Lokasi tidak terdaftar'}</span>`;
            }
        } catch (err) {
            addressVal.innerHTML = `<span class="error-text">Kesalahan Koneksi / API Key</span>`;
            console.error(err);
        }
    }

    function onError(error) {
        statusText.classList.remove('pulse');
        switch(error.code) {
            case error.PERMISSION_DENIED:
                statusText.innerHTML = "Izin GPS ditolak.";
                break;
            case error.TIMEOUT:
                statusText.innerHTML = "Waktu GPS habis.";
                break;
            default:
                statusText.innerHTML = "Gagal mengambil GPS.";
        }
    }
</script>

</body>
</html>
