<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Debug Geocoding</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .status { padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .error { background: #fee; color: #c00; border: 1px solid #c00; }
        .success { background: #efe; color: #080; border: 1px solid #080; }
        b { display: inline-block; width: 100px; }
    </style>
</head>
<body>

    <h3>Status Koneksi:</h3>
    <div id="status-box" class="status">Memulai pencarian...</div>

    <h3>Hasil Alamat:</h3>
    <div id="hasil"></div>

<script>
    // GANTI DENGAN KEY ANDA
    const API_KEY = "bdc_75dff80aec6d4698ac9b50c61f81c882"; 
    
    // Koordinat Testing (Tengger, Sale, Rembang)
    const lat = -6.8450;
    const lon = 111.6044;

    async function tesGeocoding() {
        const statusBox = document.getElementById('status-box');
        const hasilBox = document.getElementById('hasil');

        try {
            const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode?latitude=${lat}&longitude=${lon}&localityLanguage=id&key=${API_KEY}`);
            
            if (!response.ok) {
                throw new Error(`Server Error: ${response.status} (Cek API Key Anda)`);
            }

            const data = await response.json();
            
            statusBox.className = "status success";
            statusBox.innerText = "Koneksi Berhasil!";

            // Ambil data dari array administrative
            let alamat = "";
            data.administrative.forEach(item => {
                let label = "";
                if (item.adminLevel === 2) label = "Provinsi";
                if (item.adminLevel === 4) label = "Kabupaten";
                if (item.adminLevel === 6) label = "Kecamatan";
                if (item.adminLevel === 8) label = "Desa";
                
                if(label) {
                    alamat += `<p><b>${label}:</b> ${item.name}</p>`;
                }
            });

            // Dusun/Area
            alamat = `<p><b>Dusun:</b> ${data.locality || "-"}</p>` + alamat;
            
            hasilBox.innerHTML = alamat;

        } catch (err) {
            statusBox.className = "status error";
            statusBox.innerText = "Gagal: " + err.message;
            console.error(err);
        }
    }

    tesGeocoding();
</script>
</body>
</html>
